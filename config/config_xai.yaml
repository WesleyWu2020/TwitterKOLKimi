# xAI API 配置 - 使用 Grok X Search 获取真实 Twitter 数据
# 这是推荐的生产环境配置

data_source: "xai_sdk"  # ← 使用 xAI SDK (推荐，真实数据)

xai:
  api_key: "xai-your-api-key-here"                    # ← 从 https://x.ai/api 获取
  model: "grok-4.20-reasoning"                       # SDK 推荐模型

# Twitter 配置（用于 KOL 列表和其他设置）
twitter:
  username: "your_twitter_username"
  password: "your_password"
  min_followers: 200000
  keywords:
    - "BTC"
    - "Bitcoin"
    - "ETH"
    - "crypto"
  tweets_per_kol: 10
  kols:
    - username: "cz_binance"
      followers_count: 9200000
    - username: "VitalikButerin"
      followers_count: 5800000
    - username: "saylor"
      followers_count: 4100000

# OpenRouter 配置（仅用于情绪分析和辩论，不用于获取推文）
# 注意：如果使用 xAI，推文采集中不再使用 OpenRouter
openrouter:
  api_key: "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"
  model: "x-ai/grok-4-fast"
  base_url: "https://openrouter.ai/api/v1"
  max_tokens: 4000
  temperature: 0.3

