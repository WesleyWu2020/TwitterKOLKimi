# 真实数据配置 - 使用 Twitter API
# 复制此文件为 config.yaml 并填入你的 Twitter API 密钥

data_source: "twitter_api"  # ← 切换到真实数据源

twitter_api:
  bearer_token: "AAAAAAAAAAAAAAAAAAAAA..."  # ← 填入你的 Bearer Token

# Twitter 配置（用于 KOL 列表）
twitter:
  username: "your_username"
  password: "your_password"
  min_followers: 200000
  keywords:
    - "BTC"
    - "Bitcoin"
    - "ETH"
    - "crypto"
  tweets_per_kol: 10
  kols:
    - username: "cz_binance"
      followers_count: 9200000
    - username: "VitalikButerin"
      followers_count: 5800000

# OpenRouter 配置（用于情绪分析和辩论）
